# ApiForge Nginx Configuration Reference
# Add this to your /etc/nginx/sites-available/default file

# Backend API - accessible at /apiforgeapi/
location /apiforgeapi/ {
    # Remove the /apiforgeapi prefix before proxying
    rewrite ^/apiforgeapi/(.*)$ /$1 break;
    
    proxy_pass http://127.0.0.1:9753;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    
    # Timeouts
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;
    
    # Buffering
    chunked_transfer_encoding off;
    proxy_buffering off;
}

# Frontend static files - MUST come before root location
location /_next/static/ {
    proxy_pass http://127.0.0.1:9754;
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Cache static files
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Frontend - accessible at root /
location / {
    proxy_pass http://127.0.0.1:9754;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    
    # Timeouts
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;
    
    # Buffering
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;
}
